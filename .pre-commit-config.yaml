repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        exclude: ^mkdocs\.yml$
      - id: check-added-large-files
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-mod-tidy
      - id: go-imports

  # Secret scanning runs locally before a commit lands, so credentials never
  # reach a commit or CI. filesystem mode scans the staged files pre-commit
  # passes in (so no vendored/false-positive noise, and the about-to-be-
  # committed content is actually scanned). Uses the trufflehog binary from
  # the flake devshell (language: system), not the upstream hook's Go build;
  # that nixpkgs binary already disables the self-updater, so --no-update must
  # NOT be passed (it errors as a repeated flag).
  - repo: local
    hooks:
      - id: trufflehog
        name: TruffleHog secret scan
        entry: trufflehog filesystem --results=verified,unknown --fail
        language: system
        # docker-compose.yml (local dev credentials), updater_test.go (SSH key
        # fixtures for unit tests) and database.md (an example postgres DSN using
        # the RFC 2606 db.example.com placeholder) hold intentional non-secrets
        # that TruffleHog flags as "unknown". Filesystem mode ignores
        # --exclude-paths for explicitly-passed files, so skip them at the
        # pre-commit layer. Keep this list in sync with .trufflehog-exclude
        # (used by CI).
        exclude: ^(docker-compose\.yml|pkg/updater/updater_test\.go|docs/operations/database\.md)$

# A CronJob-only workload for the fire-and-forget fixture (ffapp). This models the
# real use case for argo-watcher/fire-and-forget: an app whose only workload is a
# CronJob has no long-running pod, so between schedule triggers a freshly-deployed
# image tag is never observed "running" and a normal deploy would wait out the
# timeout.
#
# The far-future schedule (Jan 1st) is a TEST DEVICE, not a real pattern: real
# CronJobs fire periodically. It simply guarantees no job runs during the phase's
# short window, so the "new image is not running" condition holds deterministically
# without the test having to race the next trigger.
#
# Applied via a directory-type Argo source (no Helm); Argo places it in the
# Application's destination namespace.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ffapp-cron
spec:
  schedule: "0 0 1 1 *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: whoami
              image: traefik/whoami:v1.10.1

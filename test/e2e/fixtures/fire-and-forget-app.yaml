# A dedicated fixture Argo Application for the fire-and-forget phase, separate
# from the app1..N soak fixtures (name "ffapp", outside their range, so no other
# phase touches it).
#
# It carries argo-watcher/fire-and-forget: "true". A deploy to this app skips the
# rollout health check and reports success immediately, so the phase can prove the
# behaviour by deploying a tag the app can never actually run and still reaching
# "deployed". No write-back annotations: the phase deploys without a token, so the
# gitops repo is never mutated and the app stays healthy on the chart-default tag.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ffapp
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argo-watcher/managed: "true"
    argo-watcher/managed-images: app=traefik/whoami
    argo-watcher/app.helm.image-tag: app.image.tag
    argo-watcher/fire-and-forget: "true"
spec:
  project: default
  sources:
    - repoURL: http://gitea-http.gitea.svc.cluster.local:3000/e2e/gitops.git
      targetRevision: main
      path: chart
      helm: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: ffapp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

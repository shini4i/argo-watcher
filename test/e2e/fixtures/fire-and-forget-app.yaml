# Dedicated fixture Argo Application for the fire-and-forget phase (name "ffapp",
# outside the app1..N soak range so no other phase touches it).
#
# Its only workload is a CronJob (deployed from the gitops repo's cronjob/ path as
# plain manifests, no Helm). A CronJob-only app runs no pod until its schedule
# fires, so a newly-deployed image tag is never observed running and a normal
# deploy would wait out the timeout. argo-watcher/fire-and-forget: "true" makes
# such a deploy report success immediately — the behaviour this fixture exists to
# prove. No write-back annotations: the phase deploys without a token, so the
# gitops repo is never mutated.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ffapp
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argo-watcher/fire-and-forget: "true"
spec:
  project: default
  source:
    repoURL: http://gitea-http.gitea.svc.cluster.local:3000/e2e/gitops.git
    targetRevision: main
    path: cronjob
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: ffapp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

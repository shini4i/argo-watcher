services:
  postgres:
    image: postgres:18.4
    restart: always
    environment:
      POSTGRES_USER: watcher
      POSTGRES_PASSWORD: watcher
      POSTGRES_DB: watcher
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U watcher" ]
      interval: 30s
      timeout: 30s
      retries: 3
    volumes:
      - ./db/data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  migrations:
    image: migrate/migrate:v4.17.0
    command: -path=/migrations/ -database postgres://watcher:watcher@postgres:5432/watcher?sslmode=disable up
    volumes:
      - ./db/migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
  backend:
    image: golang:1.25.11-alpine3.23
    volumes:
      - .:/app
    working_dir: /app
    command: go run ./cmd/argo-watcher
    environment:
      STATE_TYPE: postgres
      ARGO_URL: http://mock:8081
      ARGO_TOKEN: example
      DEPLOYMENT_TIMEOUT: 120
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: watcher
      DB_NAME: watcher
      DB_PASSWORD: watcher
      DB_MIGRATIONS_PATH: /app/db/migrations
      LOG_LEVEL: debug
      DEV_ENVIRONMENT: true
    depends_on:
      migrations:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
  frontend:
    image: node:22-alpine3.19
    volumes:
      - ./web:/app
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3100"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_API_PROXY_TARGET: http://backend:8080
      VITE_WS_BASE_URL: ws://localhost:8080
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3100:3100"
  mock:
    image: golang:1.25.11-alpine3.23
    volumes:
      - .:/app
    working_dir: /app
    command: go run ./cmd/mock
    ports:
      - "8081:8081"

  # Integration-test backend. Brought up by `task test-integration`; not part of
  # the default `docker compose up` because the dev stack does not need it.
  gitea:
    profiles: [integration]
    image: gitea/gitea:1.22
    environment:
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "false"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30
    ports:
      - "3000:3000"
      - "2222:22"

  # TCP proxy used by integration tests to deterministically inject latency on
  # the SSH path between argo-watcher (under test) and Gitea, forcing a push
  # race. Proxy definitions are created by test code via the admin API.
  # No health check: the toxiproxy image is distroless (no shell or wget),
  # so docker-compose cannot run one. Test code polls the admin API instead.
  toxiproxy:
    profiles: [integration]
    image: ghcr.io/shopify/toxiproxy:2.9.0
    command: -host=0.0.0.0
    ports:
      - "8474:8474"
      - "12222:12222"
    depends_on:
      gitea:
        condition: service_healthy

  # Keycloak for the auth e2e tests (Go integration tests + the Keycloak-enabled
  # nuclei pass). start-dev imports test/keycloak on boot: realm argo-watcher-e2e
  # with a client that emits a `groups` claim and privileged/regular test users.
  # Mapped to host 8090 so it never collides with argo-watcher on 8080. No health
  # check (the image lacks a usable shell tool, like toxiproxy); callers poll the
  # realm's OIDC discovery endpoint for readiness instead.
  keycloak:
    profiles: [integration]
    image: quay.io/keycloak/keycloak:26.6.3
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./test/keycloak/argo-watcher-e2e-realm.json:/opt/keycloak/data/import/argo-watcher-e2e-realm.json:ro
    ports:
      - "8090:8080"

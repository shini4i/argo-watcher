name: Security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # gosec and govulncheck both need the Go module to build (and the generated
  # mocks the test files import), so they share one job. continue-on-error on
  # each scan plus the final gate means BOTH run to completion even if one finds
  # problems — the job collects all findings in a single pass and only then fails.
  go-scan:
    name: Go scanners (gosec + govulncheck)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0

      - name: Install environment dependencies
        run: task install-deps

      - name: Generate mocks
        # The mock packages (cmd/argo-watcher/mock, pkg/updater/mock) are
        # gitignored and generated by mockgen. gosec and govulncheck load the
        # full package graph (including _test.go files that import the mocks),
        # so they must exist before the scanners run.
        run: task mocks

      - name: Run Gosec Security Scanner
        id: gosec
        continue-on-error: true
        uses: securego/gosec@9e6a9843d7a4a6e3e9a8539b02612c8a4aa3f889 # v2.27.1
        env:
          # The gosec image bundles an older Go with GOTOOLCHAIN=local, so it
          # refuses a go.mod that requires a newer patch (go 1.26.4). Allow it to
          # fetch the toolchain named in go.mod instead of failing.
          GOTOOLCHAIN: auto
        with:
          # Exclude the e2e lab tooling (test/e2e): it is not shipped in any
          # release binary, and its git-exec / file-read / math-rand usage is
          # intentional for a disposable local lab, not a production attack surface.
          args: -exclude-dir=test/e2e ./...

      - name: Run govulncheck
        id: govulncheck
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Fail if any Go scanner failed
        if: steps.gosec.outcome == 'failure' || steps.govulncheck.outcome == 'failure'
        run: |
          echo "gosec: ${{ steps.gosec.outcome }}"
          echo "govulncheck: ${{ steps.govulncheck.outcome }}"
          exit 1

  trivy:
    name: Trivy (dependency vulnerabilities)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Scan dependencies
        # Scans go.mod and web/package-lock.json, so both backend and frontend
        # dependencies are covered. The CI checkout is clean, so the in-repo Go
        # module cache the flake devshell creates locally (.go/.gomod) is absent
        # here — nothing to exclude.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'

  trufflehog:
    name: TruffleHog (secret scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the scan can diff the pushed/PR commit range.
          fetch-depth: 0
          persist-credentials: false

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          # .trufflehog-exclude skips files holding intentional non-secrets
          # (local dev credentials, SSH key fixtures). Keep it in sync with the
          # pre-commit hook's exclude regex.
          extra_args: --results=verified,unknown --exclude-paths .trufflehog-exclude

  # Dynamic application security testing: build the real shipped artifact (Go
  # binary + embedded web/dist UI), run it, and scan the live HTTP surface.
  # Covers both the API and the served frontend on one target, because the
  # production image serves web/dist as static files exactly the same way.
  nuclei:
    name: Nuclei (DAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to the code-scanning dashboard
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0

      - name: Install environment dependencies
        run: task install-deps

      - name: Start Keycloak
        # Needed only for the authenticated DAST pass; bring it up now so it
        # boots while the UI/binary build. Torn down at the end of the job.
        run: docker compose --profile integration up -d keycloak

      - name: Build UI and server binary
        # `task build` depends on `task docs`, which writes
        # web/public/swagger/swagger.json (reused as the DAST fuzz seed below).
        # `task build-ui` emits web/dist, which the server serves as static
        # files — identical to the production image (Dockerfile.server copies
        # web/dist to ./static).
        run: |
          task build-ui
          task build

      - name: Start argo-watcher
        env:
          STATE_TYPE: in-memory
          # ARGO_URL only has to parse as a URL; it need not be reachable. The
          # scanned surface is argo-watcher's own HTTP server.
          ARGO_URL: http://127.0.0.1:9
          ARGO_TOKEN: ci
          PORT: "8080"
          STATIC_FILES_PATH: web/dist
          LOG_LEVEL: info
          # Keycloak on, pointed at the compose container (host port 8090), so the
          # auth-gated endpoints require a token. Token validation only happens
          # when a request carries one, so the unauthenticated passes below are
          # unaffected (gated endpoints simply return 401 to them).
          KEYCLOAK_ENABLED: "true"
          KEYCLOAK_URL: http://localhost:8090
          KEYCLOAK_REALM: argo-watcher-e2e
          KEYCLOAK_CLIENT_ID: argo-watcher
          KEYCLOAK_PRIVILEGED_GROUPS: privileged
        # Backgrounded; the GitHub Actions job tears the process down on exit.
        run: ./argo-watcher &

      - name: Wait for readiness
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null 2>&1; then
              echo "argo-watcher is up"
              exit 0
            fi
            sleep 1
          done
          echo "argo-watcher did not become ready in time"
          exit 1

      - name: Prepare Nuclei inputs
        run: |
          mkdir -p "${{ github.workspace }}/nuclei-out"
          # The swag-generated spec is Swagger 2.0 with no host/schemes; inject
          # them so nuclei's OpenAPI input mode can resolve the target. (With
          # -im, -u/-target must NOT be combined — the maintainers note it
          # causes 400s — so the target lives in the spec instead.)
          jq '.host = "127.0.0.1:8080" | .schemes = ["http"]' \
            web/public/swagger/swagger.json > "${{ github.workspace }}/nuclei-out/spec.json"

      # The nuclei-action (not install-only) installs nuclei AND downloads/caches
      # the community templates, which is why scanning runs through the action
      # rather than a bare binary. Output paths are absolute so they resolve
      # regardless of the action's working directory.
      #
      # Pass 1 - passive template sweep (exposures, misconfiguration, security
      # headers, technology-detected CVEs) against the live server: the API and
      # the served frontend. nuclei exits 0 even with findings, so a failure here
      # is a real scan error and should fail the job.
      - name: Nuclei passive sweep
        uses: projectdiscovery/nuclei-action@32a91c0da7be14c07b0ade6c14fa0f6e78d97c9c # v3.1.0
        with:
          # Scope the sweep to argo-watcher's surface and keep the report
          # signal-only:
          #   -type http — only HTTP templates. Without it, nuclei's network
          #     templates (ssh/smb/ikev2/...) ignore the :8080 in the URL, probe
          #     standard ports on 127.0.0.1, and report the CI runner's OWN
          #     services rather than the application.
          #   -exclude-severity info — drop informational detections (technology
          #     fingerprinting, missing-header/SRI notes). The gate is medium+,
          #     and these added volume without actionable signal.
          #   -exclude-id prometheus-metrics — /metrics is an unauthenticated
          #     Prometheus scrape target by design (secured at the network layer,
          #     not in-app), so its medium finding is not a vulnerability here.
          #     Extend -exclude-id as further findings are triaged.
          args: >-
            -u http://127.0.0.1:8080 -no-color
            -type http
            -exclude-severity info
            -exclude-id prometheus-metrics
            -se ${{ github.workspace }}/nuclei-out/passive.sarif
            -jle ${{ github.workspace }}/nuclei-out/passive.jsonl

      # Pass 2 - active DAST fuzzing seeded by the generated Swagger spec, so
      # nuclei fuzzes argo-watcher's documented JSON API endpoints/params
      # (SQLi/XSS/SSRF/cmd-injection) rather than guessing. Best-effort: a nuclei
      # execution error (e.g. spec parsing) must not fail the job — the gate
      # below is the authoritative pass/fail, fed by whatever findings exist.
      - name: Nuclei API fuzzing (DAST)
        continue-on-error: true
        uses: projectdiscovery/nuclei-action@32a91c0da7be14c07b0ade6c14fa0f6e78d97c9c # v3.1.0
        with:
          args: >-
            -l ${{ github.workspace }}/nuclei-out/spec.json -im swagger -sfv -dast -no-color
            -se ${{ github.workspace }}/nuclei-out/dast.sarif
            -jle ${{ github.workspace }}/nuclei-out/dast.jsonl

      - name: Wait for Keycloak and prepare authenticated scan
        # A missing token means Keycloak/the realm is broken — fail loudly here
        # rather than silently scan without auth.
        run: |
          kc=http://localhost:8090
          realm=argo-watcher-e2e
          for _ in $(seq 1 60); do
            if curl -fsS "$kc/realms/$realm/.well-known/openid-configuration" >/dev/null 2>&1; then break; fi
            sleep 2
          done
          if ! curl -fsS "$kc/realms/$realm/.well-known/openid-configuration" >/dev/null 2>&1; then
            echo "::error::Keycloak realm $realm not ready after 120s"
            exit 1
          fi
          token=$(curl -fsS -X POST "$kc/realms/$realm/protocol/openid-connect/token" \
            -d grant_type=password -d client_id=argo-watcher -d scope=openid \
            -d username=priv-user -d password=priv-pass | jq -r '.access_token // empty')
          if [ -z "$token" ]; then
            echo "::error::could not obtain a Keycloak token for the authenticated scan"
            exit 1
          fi
          echo "::add-mask::$token"
          # nuclei injects custom headers from its config file; carry the
          # privileged token on every request so the gated endpoints are reached.
          printf 'header:\n  - "Keycloak-Authorization: Bearer %s"\n' "$token" \
            > "${{ github.workspace }}/nuclei-out/auth-config.yaml"

      # Pass 3 - authenticated DAST: identical swagger-seeded fuzzing, but the
      # config file carries a privileged Keycloak token so the auth-gated
      # endpoints (deploy-lock, validated task creation) are actually exercised.
      # Best-effort like pass 2; the medium+ gate stays authoritative.
      - name: Nuclei authenticated API fuzzing (DAST)
        continue-on-error: true
        uses: projectdiscovery/nuclei-action@32a91c0da7be14c07b0ade6c14fa0f6e78d97c9c # v3.1.0
        with:
          config-path: ${{ github.workspace }}/nuclei-out/auth-config.yaml
          args: >-
            -l ${{ github.workspace }}/nuclei-out/spec.json -im swagger -sfv -dast -no-color
            -se ${{ github.workspace }}/nuclei-out/authed.sarif
            -jle ${{ github.workspace }}/nuclei-out/authed.jsonl

      - name: Gate on medium+ findings
        run: |
          shopt -s nullglob
          files=(nuclei-out/*.jsonl)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No nuclei JSONL output produced; nothing to gate."
            exit 0
          fi
          # One finding per line. Fail on medium/high/critical; lower severities
          # are still reported via the SARIF upload but do not block CI.
          hits=$(cat nuclei-out/*.jsonl | jq -r '
            select(.info.severity == "medium" or .info.severity == "high" or .info.severity == "critical")
            | "\(.info.severity)\t\(.["template-id"])\t\(.["matched-at"] // .host)"')
          if [ -n "$hits" ]; then
            echo "Medium+ nuclei findings detected:"
            echo "$hits"
            exit 1
          fi
          echo "No medium+ nuclei findings."

      - name: Upload Nuclei SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
        # Upload is best-effort: a clean scan may produce no SARIF file, which
        # would otherwise error here.
        continue-on-error: true
        with:
          sarif_file: nuclei-out
          category: nuclei-dast

      - name: Stop Keycloak
        if: always()
        run: docker compose --profile integration down -v

name: Security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # gosec and govulncheck both need the Go module to build (and the generated
  # mocks the test files import), so they share one job. continue-on-error on
  # each scan plus the final gate means BOTH run to completion even if one finds
  # problems — the job collects all findings in a single pass and only then fails.
  go-scan:
    name: Go scanners (gosec + govulncheck)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Install Task
        uses: arduino/setup-task@24c5e13bce349197642746563945fcdf9355e8f4 # v2.0.0

      - name: Install environment dependencies
        run: task install-deps

      - name: Generate mocks
        # The mock packages (cmd/argo-watcher/mock, pkg/updater/mock) are
        # gitignored and generated by mockgen. gosec and govulncheck load the
        # full package graph (including _test.go files that import the mocks),
        # so they must exist before the scanners run.
        run: task mocks

      - name: Run Gosec Security Scanner
        id: gosec
        continue-on-error: true
        uses: securego/gosec@5e5517beec77b8228ba43ec8d7cc22d82ed31924 # v2.25.0
        with:
          args: ./...

      - name: Run govulncheck
        id: govulncheck
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Fail if any Go scanner failed
        if: steps.gosec.outcome == 'failure' || steps.govulncheck.outcome == 'failure'
        run: |
          echo "gosec: ${{ steps.gosec.outcome }}"
          echo "govulncheck: ${{ steps.govulncheck.outcome }}"
          exit 1

  trivy:
    name: Trivy (dependency vulnerabilities)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Scan dependencies
        # Scans go.mod and web/package-lock.json, so both backend and frontend
        # dependencies are covered.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'
          # .gomod/.go are the GOPATH/module cache the flake devshell creates
          # locally (gitignored, absent in CI). Excluded so a local `trivy fs`
          # doesn't flag stale cached module versions.
          skip-dirs: .gomod,.go

  trufflehog:
    name: TruffleHog (secret scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history so the scan can diff the pushed/PR commit range.
          fetch-depth: 0
          persist-credentials: false

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51 # v3.95.5
        with:
          extra_args: --results=verified,unknown

  # Dynamic application security testing: build the real shipped artifact (Go
  # binary + embedded web/dist UI), run it, and scan the live HTTP surface.
  # Covers both the API and the served frontend on one target, because the
  # production image serves web/dist as static files exactly the same way.
  nuclei:
    name: Nuclei (DAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload SARIF to the code-scanning dashboard
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Task
        uses: arduino/setup-task@24c5e13bce349197642746563945fcdf9355e8f4 # v2.0.0

      - name: Install environment dependencies
        run: task install-deps

      - name: Build UI and server binary
        # `task build` depends on `task docs`, which writes
        # web/public/swagger/swagger.json (reused as the DAST fuzz seed below).
        # `task build-ui` emits web/dist, which the server serves as static
        # files — identical to the production image (Dockerfile.server copies
        # web/dist to ./static).
        run: |
          task build-ui
          task build

      - name: Start argo-watcher
        env:
          STATE_TYPE: in-memory
          # ARGO_URL only has to parse as a URL; it need not be reachable. The
          # scanned surface is argo-watcher's own HTTP server.
          ARGO_URL: http://127.0.0.1:9
          ARGO_TOKEN: ci
          PORT: "8080"
          STATIC_FILES_PATH: web/dist
          LOG_LEVEL: info
        # Backgrounded; the GitHub Actions job tears the process down on exit.
        run: ./argo-watcher &

      - name: Wait for readiness
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null 2>&1; then
              echo "argo-watcher is up"
              exit 0
            fi
            sleep 1
          done
          echo "argo-watcher did not become ready in time"
          exit 1

      - name: Install Nuclei
        uses: projectdiscovery/nuclei-action@32a91c0da7be14c07b0ade6c14fa0f6e78d97c9c # v3.1.0
        with:
          install-only: true

      - name: Run Nuclei scans
        run: |
          mkdir -p nuclei-out

          # install-only installs just the binary, and -disable-update-check
          # suppresses the first-run auto-download, so the community templates
          # must be fetched explicitly (cached across runs by the action).
          nuclei -update-templates -disable-update-check

          # Pass 1 - passive template sweep: exposures, misconfiguration,
          # security headers, and technology-detected CVEs against the live
          # server (API + served frontend). A non-zero exit here is a real scan
          # error (e.g. target unreachable) and should fail the job; nuclei
          # exits 0 even when it has findings.
          nuclei -u http://127.0.0.1:8080 \
            -disable-update-check -no-color \
            -se nuclei-out/passive.sarif -jle nuclei-out/passive.jsonl

          # Pass 2 - active DAST fuzzing seeded by the generated Swagger spec, so
          # nuclei fuzzes argo-watcher's documented JSON API endpoints/params
          # (SQLi/XSS/SSRF/cmd-injection) rather than guessing.
          #
          # With -im, nuclei reads the target from the spec itself; -u/-target
          # MUST NOT be combined (the maintainers note it causes 400s). Our
          # swag-generated spec is Swagger 2.0 with no host/schemes, so we inject
          # them to make the spec self-contained. -sfv skips required-var
          # validation for path/query params. Best-effort: a nuclei execution
          # error (e.g. spec parsing) is surfaced as a warning but does not fail
          # the job — findings still feed the gate below.
          jq '.host = "127.0.0.1:8080" | .schemes = ["http"]' \
            web/public/swagger/swagger.json > nuclei-out/spec.json
          if ! nuclei -l nuclei-out/spec.json -im swagger -sfv -dast \
              -disable-update-check -no-color \
              -se nuclei-out/dast.sarif -jle nuclei-out/dast.jsonl; then
            echo "::warning::Nuclei Swagger DAST pass exited non-zero (findings still evaluated)"
          fi

      - name: Gate on medium+ findings
        run: |
          shopt -s nullglob
          files=(nuclei-out/*.jsonl)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No nuclei JSONL output produced; nothing to gate."
            exit 0
          fi
          # One finding per line. Fail on medium/high/critical; lower severities
          # are still reported via the SARIF upload but do not block CI.
          hits=$(cat nuclei-out/*.jsonl | jq -r '
            select(.info.severity == "medium" or .info.severity == "high" or .info.severity == "critical")
            | "\(.info.severity)\t\(.["template-id"])\t\(.["matched-at"] // .host)"')
          if [ -n "$hits" ]; then
            echo "Medium+ nuclei findings detected:"
            echo "$hits"
            exit 1
          fi
          echo "No medium+ nuclei findings."

      - name: Upload Nuclei SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c35d1b164463ee62a100735382aaaa525c5d3496 # v2.25.6
        # Upload is best-effort: a clean scan may produce no SARIF file, which
        # would otherwise error here.
        continue-on-error: true
        with:
          sarif_file: nuclei-out
          category: nuclei-dast

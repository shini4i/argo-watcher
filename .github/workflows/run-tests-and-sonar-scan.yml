name: Run unit tests
on:
  push:
    branches:
      - main
    paths:
      - '**/*.go'
      - 'web/**'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**/*.go'
      - 'web/**'

jobs:
  security_scan:
    name: Security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod

      - name: Install Task
        uses: arduino/setup-task@24c5e13bce349197642746563945fcdf9355e8f4  # v2.0.0

      - name: Install environment dependencies
        run: task install-deps

      - name: Generate swagger docs
        run: task docs

      - name: Run Gosec Security Scanner
        uses: securego/gosec@5e5517beec77b8228ba43ec8d7cc22d82ed31924  # v2.25.0
        with:
          args: ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod

      - name: Install Task
        uses: arduino/setup-task@24c5e13bce349197642746563945fcdf9355e8f4  # v2.0.0

      - name: Install environment dependencies
        run: task install-deps

      - name: Run database migrations
        run: task ci-migrate

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_USER: postgres
          DB_NAME: postgres
          DB_PASSWORD: postgres
          DB_PORT: 5432
          STATE_TYPE: in-memory
          ARGO_URL: http://localhost:8081
          POSTGRES_DSN: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
        run: task test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@aa56896cf108bd10b5eb883cd1d24196da57f695  # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out

  frontend_test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: web
        run: npm run test -- --coverage

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@aa56896cf108bd10b5eb883cd1d24196da57f695  # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: web/coverage/lcov.info
          flags: frontend

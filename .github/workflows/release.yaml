name: release

on:
  push:
    tags:
      - v*.*.* # stable release, v0.0.1
      - v*.*.*-pre.* # pre-release, v0.0.1-pre.calendardate

jobs:
  release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write # needed to write releases
      packages: write # needed to push container images to GHCR
      id-token: write # needed for signing the images with GitHub OIDC Token
    steps:
      - name: Set up QEMU # required for multi architecture build - https://goreleaser.com/cookbooks/multi-platform-docker-images/?h=multi#other-things-to-pay-attention-to
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx # dockers_v2 pushes a multi-arch manifest, which needs the docker-container driver (the default docker driver can't)
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          # Matches the setup-go `cache: false` policy below: this release
          # publishes signed artifacts, so don't restore the buildx binary from
          # a cache a PR run could have poisoned.
          cache-binary: false

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # required for changelog to work properly - https://github.com/goreleaser/goreleaser-action#usage
          submodules: true
          # goreleaser authenticates via the GITHUB_TOKEN env var, not the
          # checkout-persisted git credential, so we drop the on-disk token.
          persist-credentials: false

      - name: Install NodeJS
        # zizmor: ignore[cache-poisoning] no `cache:` input is set, so setup-node creates no cache to poison (v6.4.0)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          # Release publishes signed artifacts. setup-go enables the build/module
          # cache by default; disable it so a poisoned cache (e.g. from a
          # PR-populated key) cannot inject content into a release.
          cache: false

      - name: Install Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52 # v3.0.0

      - name: Install environment dependencies
        run: task install-deps

      - name: Generate swagger docs
        run: task docs

      - name: Build argo-watcher UI
        run: task build-ui

      - name: Clean frontend install artifacts
        run: rm -rf web/node_modules

      - name: Install Cosign
        # Pinned to the v3.x line on purpose: it installs cosign v2.x. The
        # cosign-installer v4 line installs cosign v3+, which requires a
        # `--bundle` arg for the `cosign sign-blob` call in .goreleaser.yaml —
        # bumping the major would break checksum signing until that is reworked.
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install Syft for SBOM Generation
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get previous stable release tag
        id: previous-stable-release-tag
        if: (!contains(github.ref, 'pre'))
        run: |
          git fetch --tags
          previous_stable_tag=$(git tag | sort -V | grep -v "pre" | tail -2 | head -1)
          echo "GORELEASER_PREVIOUS_TAG=$previous_stable_tag" >> $GITHUB_OUTPUT

      - name: Run GoReleaser for stable release
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        if: (!contains(github.ref, 'pre'))
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
          GORELEASER_PREVIOUS_TAG: ${{ steps.previous-stable-release-tag.outputs.GORELEASER_PREVIOUS_TAG }}

      - name: Run GoReleaser for pre-release
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        if: contains(github.ref, 'pre')
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.changelog.outputs.RELEASE_TAG }}

      - name: Update helm chart
        uses: shini4i/helm-charts-updater@v1 # zizmor: ignore[unpinned-uses] first-party shini4i action; policy permits semver tags
        if: startsWith(github.ref, 'refs/tags/v') && (!contains(github.ref, 'pre'))
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          gh_user: shini4i
          gh_repo: charts
          chart_name: argo-watcher
          app_version: ${{ github.ref_name }}
          update_chart_annotations: true

      - name: Prune superseded pre-releases
        # Once a stable vX.Y.Z ships, the date-stamped vX.Y.Z-pre.* snapshots
        # that led to it are obsolete. Delete those releases and their tags so
        # the Releases page keeps only shipped versions. Runs last and tolerates
        # per-tag failures so a cleanup hiccup can't fail an otherwise-good
        # release; skipped failures surface as workflow annotations.
        #
        # Guard on the tag ref (matching the helm step) so this destructive
        # delete can never run against a branch/dispatch ref if a future trigger
        # is added — GITHUB_REF_NAME would then be a branch name, not a version.
        if: startsWith(github.ref, 'refs/tags/v') && (!contains(github.ref, 'pre'))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 200 --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease and (.tagName | startswith(env.GITHUB_REF_NAME + "-pre."))) | .tagName' \
          | while read -r tag; do
              echo "Deleting superseded pre-release: $tag"
              gh release delete "$tag" --cleanup-tag --yes \
                || echo "::warning::failed to delete pre-release $tag"
            done

name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  pr-agent:
    # Skip events raised by bots (including pr-agent's own comments) to avoid loops.
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    steps:
      - name: PR Agent
        uses: The-PR-Agent/pr-agent@8e4d32e5497defd43c023a404f73560c62728961  # v0.39.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-model review: route through LiteLLM to DeepSeek.
          config.model: "deepseek/deepseek-v4-pro"
          config.fallback_models: '["deepseek/deepseek-v4-pro"]'
          DEEPSEEK.KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # Default config targets OpenAI; keep it empty so LiteLLM uses DeepSeek only.
          OPENAI_KEY: ""
          # Auto-run describe + review on each PR; skip the noisier improve pass.
          github_action_config.auto_describe: "true"
          github_action_config.auto_review: "true"
          github_action_config.auto_improve: "false"
